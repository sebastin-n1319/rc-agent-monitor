<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <!--
    Adit wordmark — for dark backgrounds (header)
    "ad" = Adit orange, "it" = Adit light blue
    Person figure: circle head above "i", arms span as "t" crossbar
  -->

  <!-- "ad" in Adit orange -->
  <text x="2" y="68"
    font-family="'Arial Rounded MT Bold','Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="66" font-weight="900" fill="#F4891F">ad</text>

  <!-- "i" stem (no dot — person figure is the dot) -->
  <text x="138" y="68"
    font-family="'Arial Rounded MT Bold','Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="66" font-weight="900" fill="#21AAE0">ı</text>

  <!-- "t" in light blue -->
  <text x="163" y="68"
    font-family="'Arial Rounded MT Bold','Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="66" font-weight="900" fill="#21AAE0">t</text>

  <!-- Person figure — head circle (replaces "i" dot) -->
  <circle cx="152" cy="10" r="9" fill="#21AAE0"/>
  <!-- Person arms / "t" crossbar -->
  <line x1="128" y1="26" x2="232" y2="26" stroke="#21AAE0" stroke-width="10" stroke-linecap="round"/>

  <!-- "Agent Monitor" sub-label -->
  <text x="2" y="80"
    font-family="'Arial Rounded MT Bold','Arial',sans-serif"
    font-size="0" fill="transparent">Agent Monitor</text>
</svg>
